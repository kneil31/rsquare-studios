<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'nonce-a9d74bd526f9ab88f4695d7e3b856d25'; style-src 'unsafe-inline'; img-src 'self' data: https://img.youtube.com; connect-src https://script.google.com https://script.googleusercontent.com https://docs.google.com; font-src 'none'; frame-src https://www.youtube.com https://youtube.com; base-uri 'none'; form-action https://script.google.com;">
    <title>Rsquare Studios — Project Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #191919;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid #333;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .header .subtitle {
            font-size: 13px;
            color: #8b5cf6;
            margin-top: 4px;
        }

        /* ── PIN Gate ── */
        .pin-gate {
            text-align: center;
            padding: 40px 20px;
        }
        .pin-gate p {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .pin-input {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .pin-input input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .pin-input input:focus {
            border-color: #8b5cf6;
        }
        .pin-error {
            color: #ef4444;
            font-size: 13px;
            min-height: 20px;
            margin-top: 8px;
        }
        .pin-lockout {
            color: #ef4444;
            font-size: 13px;
        }

        /* ── Project Info ── */
        .project-info {
            background: #232323;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 3px solid #8b5cf6;
        }
        .project-info h2 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 4px;
        }
        .project-status {
            font-size: 12px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        .status-shoot_done { background: #92400e; color: #fbbf24; }
        .status-pending_song { background: #92400e; color: #fbbf24; }
        .status-sent { background: #4c1d95; color: #c4b5fd; }
        .status-editing { background: #1e3a5f; color: #60a5fa; }
        .status-review { background: #365314; color: #86efac; }
        .status-delivered { background: #166534; color: #86efac; }
        .status-done { background: #333; color: #999; }

        /* ── Section Cards ── */
        .section-card {
            background: #232323;
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 16px;
        }
        .section-card h3 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-icon {
            font-size: 16px;
        }

        /* ── Form Elements ── */
        label {
            display: block;
            font-size: 13px;
            color: #999;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"], textarea, select {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            color: #e0e0e0;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: #8b5cf6;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ── Correction Rows ── */
        .correction-row {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            position: relative;
        }
        .correction-row .row-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .correction-row input.timestamp {
            width: 80px;
            margin-bottom: 0;
            text-align: center;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
        }
        .correction-row select {
            width: auto;
            flex: 1;
            margin-bottom: 0;
            font-size: 13px;
        }
        .correction-row textarea {
            min-height: 50px;
            font-size: 13px;
            margin-bottom: 0;
        }
        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #3a3a3a;
            border: none;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .remove-btn:hover {
            background: #ef4444;
            color: #fff;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #8b5cf6;
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
        }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }

        /* ── Toast / Status ── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast-success {
            background: #065f46;
            color: #6ee7b7;
        }
        .toast-error {
            background: #7f1d1d;
            color: #fca5a5;
        }

        /* ── Privacy Note ── */
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #2a2a2a;
        }

        /* ── Progress Tracker (Domino's style) ── */
        .tracker {
            background: #232323;
            border-radius: 12px;
            padding: 20px 16px 24px;
            margin-bottom: 16px;
        }
        .tracker h3 {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .tracker-steps {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            position: relative;
            padding: 0 4px;
        }
        .tracker-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
        }
        .tracker-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #333;
            border: 3px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            transition: all 0.3s;
            position: relative;
        }
        .tracker-step.completed .tracker-dot {
            background: #166534;
            border-color: #22c55e;
            color: #86efac;
        }
        .tracker-step.active .tracker-dot {
            background: #1e3a5f;
            border-color: #3b82f6;
            color: #93c5fd;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 16px rgba(59, 130, 246, 0.6); }
        }
        .tracker-label {
            font-size: 10px;
            color: #666;
            margin-top: 8px;
            text-align: center;
            line-height: 1.2;
            max-width: 60px;
        }
        .tracker-step.completed .tracker-label {
            color: #86efac;
        }
        .tracker-step.active .tracker-label {
            color: #93c5fd;
            font-weight: 600;
        }
        /* Connector line between dots */
        .tracker-line {
            position: absolute;
            top: 14px;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 0;
        }
        .tracker-line-bg {
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 100%;
            background: #333;
            border-radius: 2px;
        }
        .tracker-line-fill {
            position: absolute;
            top: 0;
            left: 24px;
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #3b82f6);
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* ── Photo Tracker ── */
        .photo-delivery {
            background: #232323;
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .photo-delivery h3 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 12px;
        }
        .delivery-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: #166534;
            border-radius: 10px;
            color: #86efac;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .delivery-link:hover {
            background: #15803d;
        }
        .delivery-pending {
            color: #999;
            font-size: 13px;
            font-style: italic;
        }
        .photo-info {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
        }
        .photo-info-item {
            text-align: center;
        }
        .photo-info-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .photo-info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }
        .photo-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 10px 20px;
            background: #25D366;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* ── Hidden ── */
        .hidden { display: none; }

        /* ── Submission History ── */
        .history-item {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .history-item .type-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
        }
        .type-song { background: #4c1d95; color: #c4b5fd; }
        .type-correction { background: #1e3a5f; color: #93c5fd; }
        .type-approval { background: #166534; color: #86efac; }
        .history-item .timestamp-ref {
            font-family: 'SF Mono', 'Menlo', monospace;
            color: #8b5cf6;
            font-size: 12px;
        }
        .history-empty {
            text-align: center;
            color: #666;
            font-size: 13px;
            padding: 20px;
        }

        /* ── Version Links ── */
        .version-card {
            background: #232323;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .version-card h3 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }
        .version-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .version-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #8b5cf6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .version-link:hover {
            background: #333;
        }
        .version-link .v-badge {
            background: #8b5cf6;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }
        .version-current {
            border-color: #8b5cf6;
            background: #1e1340;
        }
        .no-versions {
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        /* ── Mark as Fixed ── */
        .correction-row.fixed {
            opacity: 0.5;
            border-left: 3px solid #22c55e;
        }
        .correction-row.fixed textarea,
        .correction-row.fixed input,
        .correction-row.fixed select {
            text-decoration: line-through;
            color: #666;
        }
        .fix-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #999;
            user-select: none;
        }
        .fix-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #22c55e;
            margin-bottom: 0;
        }
        .fix-toggle.checked {
            color: #22c55e;
        }

        /* ── Editor Password Gate ── */
        .editor-pw-gate {
            text-align: center;
            padding: 40px 20px;
        }
        .editor-pw-gate p {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .editor-pw-input {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }
        .editor-pw-input input {
            width: 200px;
            height: 44px;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .editor-pw-input input:focus {
            border-color: #8b5cf6;
        }
        .editor-pw-input button {
            height: 44px;
            padding: 0 18px;
            background: #8b5cf6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* ── Editor Dashboard ── */
        .editor-project-card {
            background: #232323;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 3px solid #8b5cf6;
        }
        .editor-project-card h3 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 8px;
        }
        .editor-stats {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        .editor-stats .done {
            color: #22c55e;
            font-weight: 600;
        }
        .editor-song {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 3px solid #c4b5fd;
        }
        .editor-song .song-label {
            color: #c4b5fd;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .editor-correction {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .editor-correction.is-fixed {
            opacity: 0.5;
            border-left: 3px solid #22c55e;
        }
        .editor-correction .correction-body {
            flex: 1;
        }
        .editor-correction .ts-badge {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            color: #8b5cf6;
            background: #1e1340;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .editor-correction .correction-text {
            font-size: 13px;
            margin-top: 4px;
        }
        .editor-correction .correction-meta {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }
        .priority-must {
            color: #fbbf24;
            font-size: 11px;
            font-weight: 600;
        }
        .priority-nice {
            color: #60a5fa;
            font-size: 11px;
        }
        .fix-btn {
            min-width: 70px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #333;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .fix-btn:hover {
            border-color: #22c55e;
            color: #22c55e;
        }
        .fix-btn.fixed {
            background: #166534;
            border-color: #22c55e;
            color: #86efac;
        }
        .fix-btn.cant-fix {
            background: #7f1d1d;
            border-color: #ef4444;
            color: #fca5a5;
        }
        .fix-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .cant-fix-note {
            font-size: 11px;
            color: #fca5a5;
            margin-top: 4px;
            font-style: italic;
        }
        .editor-correction.is-cant-fix {
            opacity: 0.6;
            border-left: 3px solid #ef4444;
        }
        .correction-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .btn-notify {
            background: #1e3a5f;
            border: 1px solid #2563eb;
            color: #93c5fd;
            width: 100%;
            margin-top: 16px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-notify:hover {
            background: #1e40af;
        }
        .btn-notify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .editor-section-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 12px 0 8px;
            font-weight: 600;
        }
        .editor-empty {
            text-align: center;
            color: #666;
            font-size: 13px;
            padding: 20px;
        }
        .editor-loading {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 40px 20px;
        }
        .editor-refresh {
            text-align: center;
            margin-bottom: 16px;
        }
        .editor-refresh button {
            background: #333;
            border: 1px solid #444;
            color: #999;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .editor-refresh button:hover {
            background: #444;
            color: #e0e0e0;
        }

        /* ── Client Fixed Indicator ── */
        .client-fixed-list {
            margin-top: 12px;
        }
        .client-fixed-item {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .client-fixed-item.is-fixed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .fix-indicator {
            font-size: 14px;
            flex-shrink: 0;
        }

        /* ── Batch Submit Banner ── */
        .batch-banner {
            background: #1e3a5f;
            border: 1px solid #2563eb;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #93c5fd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .batch-banner .info-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        /* ── Approve Final ── */
        .btn-approve {
            background: #166534;
            color: #86efac;
            width: 100%;
            margin-top: 12px;
        }
        .btn-approve:hover:not(:disabled) {
            background: #15803d;
        }

        /* ── Admin Filter Tabs ── */
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            padding: 0 2px;
        }
        .admin-tab {
            padding: 6px 14px;
            border-radius: 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #999;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;

        // ── Progress Tracker ──
        function buildTracker(status) {
            var stages = [
                {key: 'shoot_done', label: 'Shoot Done', icon: '\uD83D\uDCF7'},
                {key: 'sent', label: 'Sent to Editor', icon: '\uD83D\uDCE8'},
                {key: 'editing', label: 'Editing', icon: '\u270F\uFE0F'},
                {key: 'review', label: 'Edits Done', icon: '\u2714'},
                {key: 'delivered', label: 'Delivered', icon: '\uD83C\uDF89'},
            ];

            // Also map old statuses
            var statusMap = {
                'pending_song': 'sent',
                'done': 'delivered',
            };
            var current = statusMap[status] || status;

            // Find active index
            var activeIdx = -1;
            for (var i = 0; i < stages.length; i++) {
                if (stages[i].key === current) { activeIdx = i; break; }
            }
            if (activeIdx === -1) activeIdx = 0;

            var tracker = el('div', {className: 'tracker'});
            tracker.appendChild(el('h3', {textContent: 'Your Edit Status'}));

            var container = el('div', {style: 'position: relative;'});

            // Background + fill lines
            var lineWrap = el('div', {className: 'tracker-line'});
            lineWrap.appendChild(el('div', {className: 'tracker-line-bg'}));
            var fillPercent = activeIdx / (stages.length - 1) * 100;
            var fill = el('div', {className: 'tracker-line-fill'});
            fill.style.width = 'calc(' + fillPercent + '% - 24px)';
            lineWrap.appendChild(fill);
            container.appendChild(lineWrap);

            var steps = el('div', {className: 'tracker-steps'});
            stages.forEach(function(stage, idx) {
                var stepClass = 'tracker-step';
                if (idx < activeIdx) stepClass += ' completed';
                else if (idx === activeIdx) stepClass += ' active';

                var step = el('div', {className: stepClass});
                var dot = el('div', {className: 'tracker-dot'});
                if (idx < activeIdx) {
                    dot.textContent = '\u2714';
                } else if (idx === activeIdx) {
                    dot.textContent = stage.icon;
                } else {
                    dot.textContent = (idx + 1).toString();
                }
                step.appendChild(dot);
                step.appendChild(el('div', {className: 'tracker-label', textContent: stage.label}));
                steps.appendChild(step);
            });

            container.appendChild(steps);
            tracker.appendChild(container);
            return tracker;
        }

        function submitCorrections() {
            var rows = document.querySelectorAll('#corrections-list .correction-row');
            var generalNotes = document.getElementById('general-notes').value.trim();
            var corrections = [];

            rows.forEach(function(row) {
                // Skip rows marked as fixed
                if (row.classList.contains('fixed')) return;
                var ts = row.querySelector('[data-field="ts"]').value.trim();
                var desc = row.querySelector('[data-field="desc"]').value.trim();
                var priority = row.querySelector('[data-field="priority"]').value;
                if (desc) {
                    corrections.push({ts: ts || '\u2014', desc: desc, priority: priority});
                }
            });

            if (corrections.length === 0 && !generalNotes) {
                showToast('Please add at least one correction or note', 'error');
                return;
            }

            // Build combined content for Sheet
            var contentParts = corrections.map(function(c) {
                return '[' + c.ts + '] (' + c.priority.replace('_', ' ') + ') ' + c.desc;
            });
            if (generalNotes) contentParts.push('Notes: ' + generalNotes);

            // Post each correction as a separate row + general notes
            var pending = 0;
            var done = 0;

            corrections.forEach(function(c) {
                pending++;
                postFeedback({
                    type: 'feedback',
                    project: currentProject.name,
                    feedback_type: 'correction',
                    timestamp: c.ts,
                    content: c.desc,
                    priority: c.priority.replace('_', ' '),
                    pin: currentProject.pin,
                }, function() {
                    done++;
                    if (done === pending) onAllCorrectionsPosted();
                });
            });

            if (generalNotes) {
                pending++;
                postFeedback({
                    type: 'feedback',
                    project: currentProject.name,
                    feedback_type: 'correction',
                    timestamp: '',
                    content: generalNotes,
                    priority: '',
                    pin: currentProject.pin,
                }, function() {
                    done++;
                    if (done === pending) onAllCorrectionsPosted();
                });
            }

            if (pending === 0) return;

            function onAllCorrectionsPosted() {
                // Build WhatsApp message
                var msg = 'Hi Ram\n\n' + currentProject.name + ' corrections:\n\n';
                corrections.forEach(function(c) {
                    msg += '[' + c.ts + '] ' + c.desc + '\n';
                });

                openWhatsApp(msg);

                // Add to local history
                addToHistory({
                    type: 'correction',
                    content: contentParts.join('\n'),
                    time: new Date().toLocaleString(),
                });

                // Clear form
                document.getElementById('corrections-list').textContent = '';
                document.getElementById('general-notes').value = '';
                correctionCount = 0;
                addCorrectionRow();
            }
        }

        // ── POST to Google Apps Script ──
        var _lastPostTime = 0;
        var POST_COOLDOWN_MS = 5000;

        function postFeedback(data, onSuccess) {
            var now = Date.now();
            if (now - _lastPostTime < POST_COOLDOWN_MS) {
                showToast('Please wait a few seconds before submitting again.', 'error');
                return;
            }
            _lastPostTime = now;

            // Disable all submit buttons during request
            var submitBtns = document.querySelectorAll('.btn-primary, .btn-approve');
            submitBtns.forEach(function(b) { b.disabled = true; });

            var params = new URLSearchParams();
            Object.keys(data).forEach(function(k) { params.append(k, data[k]); });

            fetch(_config.script_url, {
                method: 'POST',
                body: params,
            }).then(function() {
                showToast('Submitted successfully!', 'success');
                if (onSuccess) onSuccess();
            }).catch(function(err) {
                showToast('Failed to submit. Try again.', 'error');
            }).finally(function() {
                setTimeout(function() {
                    submitBtns.forEach(function(b) { b.disabled = false; });
                }, POST_COOLDOWN_MS);
            });
        }

        // ── CSV Parser (no external lib) ──
        function parseCSV(text) {
            var lines = [];
            var current = '';
            var inQuotes = false;
            var rows = [];
            for (var i = 0; i < text.length; i++) {
                var ch = text[i];
                if (inQuotes) {
                    if (ch === '"' && text[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        lines.push(current);
                        current = '';
                    } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                        lines.push(current);
                        current = '';
                        if (ch === '\r') i++;
                        rows.push(lines);
                        lines = [];
                    } else {
                        current += ch;
                    }
                }
            }
            if (current || lines.length > 0) {
                lines.push(current);
                rows.push(lines);
            }
            return rows;
        }

            });
        }

        // ── Role Password Gate ──
        var roleAttempts = 0;
        var roleLockUntil = 0;
        var activeRole = '';

        async function initRoleGate(role) {
            activeRole = role;
            var hashedRole = await hashKey(role);
            if (!ENCRYPTED_ROLES[hashedRole]) return;

            var gate = document.getElementById('editor-gate');
            gate.classList.remove('hidden');
            // Update prompt text
            gate.querySelector('p').textContent = 'Enter editor dashboard password';
            var container = document.getElementById('editor-pw-input');
            var inp = el('input', {type: 'password', placeholder: 'Password', autocomplete: 'off'});
            var btn = el('button', {textContent: 'Unlock'});
            container.appendChild(inp);
            container.appendChild(btn);
            btn.addEventListener('click', function() { checkRolePw(inp, hashedRole); });
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkRolePw(inp, hashedRole);
            });
            inp.focus();
        }

        async function checkRolePw(inp, role) {
            var now = Date.now();
            var errEl = document.getElementById('editor-error');
            if (now < roleLockUntil) {
                var secs = Math.ceil((roleLockUntil - now) / 1000);
                errEl.textContent = 'Too many attempts. Wait ' + secs + 's';
                return;
            }

            try {
                var plaintext = await decryptContent(inp.value, ENCRYPTED_ROLES[role]);
                var data = JSON.parse(plaintext);
                _config = {
                    script_url: data.script_url,
                    sheet_id: data.sheet_id,
                    gid_feedback: data.gid_feedback,
                    ram_phone: data.ram_phone,
                };
                _roleData = data;
                // Update heading with label from decrypted payload
                if (data.label) {
                    document.querySelector('.subtitle').textContent = data.label;
                }
                document.getElementById('editor-gate').classList.add('hidden');
                if (activeRole === 'admin') {
                    document.getElementById('admin-content').classList.remove('hidden');
                    buildAdminDashboard(data);
                } else {
                    document.getElementById('editor-content').classList.remove('hidden');
                    buildEditorDashboard(activeRole, data);
                }
            } catch(e) {
                // GCM auth failure = wrong password
                roleAttempts++;
                if (roleAttempts >= 3) {
                    roleLockUntil = now + 15000;
                    errEl.textContent = 'Too many attempts. Wait 15s';
                    roleAttempts = 0;
                } else {
                    errEl.textContent = 'Incorrect password.';
                }
                inp.value = '';
                inp.focus();
            }
        }

                }
                card.appendChild(infoGrid);
                if (proj.delivery_link && isAllowedUrl(proj.delivery_link)) {
                    var dlWrap = el('div', {style: 'margin-top: 12px;'});
                    dlWrap.appendChild(el('a', {
                        className: 'delivery-link',
                        textContent: '\uD83D\uDCE5 View Photos',
                        href: proj.delivery_link,
                        target: '_blank',
                        rel: 'noreferrer noopener',
                    }));
                    card.appendChild(dlWrap);
                } else {
                    card.appendChild(el('div', {
                        style: 'text-align: center; padding: 12px; color: #888; font-style: italic;',
                        textContent: 'Delivery link not set yet.',
                    }));
                }
            }

            // Divider for both
            if (viewType === 'both') {
                card.appendChild(el('hr', {className: 'section-divider'}));
            }

            // Video side
            if (viewType === 'video' || viewType === 'both') {
                if (viewType === 'both') {
                    card.appendChild(el('div', {className: 'section-divider-label', textContent: 'Video Tracker'}));
                }
                card.appendChild(buildTracker(getStatus(proj, 'video')));

                // Version links
                var versions = proj.versions || [];
                if (versions.length > 0) {
                    var vList = el('div', {className: 'version-list', style: 'margin-top: 10px;'});
                    versions.forEach(function(v, idx) {
                        var isCurrent = idx === versions.length - 1;
                        var link = el('a', {
                            className: 'version-link' + (isCurrent ? ' version-current' : ''),
                            target: '_blank',
                            rel: 'noreferrer noopener',
                        });
                        if (isAllowedUrl(v.url)) link.setAttribute('href', v.url);
                        link.appendChild(el('span', {className: 'v-badge', textContent: v.label}));
                        link.appendChild(document.createTextNode(isCurrent ? 'Latest' : 'Watch'));
                        vList.appendChild(link);
                    });
                    card.appendChild(vList);
                }

                // Song choices
                var songs = projEntries.filter(function(e) { return e.type === 'song'; });
                if (songs.length > 0) {
                    card.appendChild(el('div', {className: 'editor-section-label', textContent: 'Song Choices'}));
                    songs.forEach(function(s) {
                        var songDiv = el('div', {className: 'editor-song'});
                        songDiv.appendChild(el('div', {className: 'song-label', textContent: '\u266B Song'}));
                        songDiv.appendChild(el('div', {textContent: s.content}));
                        if (s.submitted) {
                            songDiv.appendChild(el('div', {
                                style: 'font-size: 11px; color: #777; margin-top: 4px;',
                                textContent: 'Submitted: ' + s.submitted,
                            }));
                        }
                        card.appendChild(songDiv);
                    });
                }

                // Corrections
                var corrections = projEntries.filter(function(e) { return e.type === 'correction'; });
                if (corrections.length > 0) {
                    var fixedCount = corrections.filter(function(c) { return c.fixed === 'yes'; }).length;
                    var cantCount = corrections.filter(function(c) { return c.fixed === 'cant_fix'; }).length;
                    var counterText = 'Corrections (' + fixedCount + '/' + corrections.length + ' fixed';
                    if (cantCount > 0) counterText += ', ' + cantCount + ' can\u2019t fix';
                    counterText += ')';
                    card.appendChild(el('div', {
                        className: 'editor-section-label',
                        textContent: counterText,
                    }));
                    corrections.forEach(function(c) {
                        var rowClass = 'editor-correction';
                        if (c.fixed === 'yes') rowClass += ' is-fixed';
                        else if (c.fixed === 'cant_fix') rowClass += ' is-cant-fix';
                        var row = el('div', {className: rowClass});
                        var body = el('div', {className: 'correction-body'});

                        if (c.timestamp) {
                            body.appendChild(el('span', {className: 'ts-badge', textContent: '[' + c.timestamp + ']'}));
                        }
                        body.appendChild(el('div', {className: 'correction-text', textContent: c.content}));

                        if (c.priority) {
                            var pClass = c.priority.toLowerCase().indexOf('must') >= 0 ? 'priority-must' : 'priority-nice';
                            body.appendChild(el('span', {className: pClass, textContent: c.priority}));
                        }
                        if (c.fixed === 'cant_fix' && c.fixedNote) {
                            body.appendChild(el('div', {className: 'cant-fix-note', textContent: 'Note: ' + c.fixedNote}));
                        }
                        if (c.submitted) {
                            body.appendChild(el('div', {className: 'correction-meta', textContent: 'Submitted: ' + c.submitted}));
                        }

                        row.appendChild(body);

                        if (showActions) {
                            // Action buttons container
                            var actions = el('div', {className: 'correction-actions'});

                            var fixBtn = el('button', {
                                className: 'fix-btn' + (c.fixed === 'yes' ? ' fixed' : ''),
                                textContent: c.fixed === 'yes' ? '\u2714 Fixed' : 'Fix',
                            });

                            var cantBtn = el('button', {
                                className: 'fix-btn' + (c.fixed === 'cant_fix' ? ' cant-fix' : ''),
                                textContent: c.fixed === 'cant_fix' ? '\u2718 Can\u2019t' : 'Can\u2019t',
                            });

                            (function(correction, fb, cb, rowEl, bodyEl, projData, allProjEntries, cardEl) {
                                function updateStatus(newStatus, note) {
                                    fb.disabled = true;
                                    cb.disabled = true;
                                    var params = new URLSearchParams();
                                    params.append('type', 'feedback_update');
                                    params.append('project', projData.name);
                                    params.append('timestamp', correction.timestamp);
                                    params.append('content', correction.content);
                                    params.append('fixed', newStatus);
                                    if (note) params.append('note', note);
                                    // Server-side auth: send project PIN from role blob
                                    var projPin = (_roleData && _roleData.project_pins) ? _roleData.project_pins[projData.name] : '';
                                    if (projPin) params.append('pin', projPin);
                                    fetch(_config.script_url, {method: 'POST', body: params}).then(function() {
                                        correction.fixed = newStatus;
                                        correction.fixedNote = note || '';
                                        fb.disabled = false;
                                        cb.disabled = false;
                                        fb.textContent = newStatus === 'yes' ? '\u2714 Fixed' : 'Fix';
                                        fb.className = 'fix-btn' + (newStatus === 'yes' ? ' fixed' : '');
                                        cb.textContent = newStatus === 'cant_fix' ? '\u2718 Can\u2019t' : 'Can\u2019t';
                                        cb.className = 'fix-btn' + (newStatus === 'cant_fix' ? ' cant-fix' : '');
                                        rowEl.className = 'editor-correction';
                                        if (newStatus === 'yes') rowEl.classList.add('is-fixed');
                                        else if (newStatus === 'cant_fix') rowEl.classList.add('is-cant-fix');
                                        var oldNote = rowEl.querySelector('.cant-fix-note');
                                        if (oldNote) oldNote.remove();
                                        if (newStatus === 'cant_fix' && note) {
                                            var noteEl = el('div', {className: 'cant-fix-note', textContent: 'Note: ' + note});
                                            bodyEl.insertBefore(noteEl, bodyEl.querySelector('.correction-meta'));
                                        }
                                        // Update counter label
                                        var allCorr = allProjEntries.filter(function(e) { return e.type === 'correction'; });
                                        var fc = allCorr.filter(function(cc) { return cc.fixed === 'yes'; }).length;
                                        var cf = allCorr.filter(function(cc) { return cc.fixed === 'cant_fix'; }).length;
                                        var labels = cardEl.querySelectorAll('.editor-section-label');
                                        labels.forEach(function(lbl) {
                                            if (lbl.textContent.indexOf('Corrections') === 0) {
                                                var text = 'Corrections (' + fc + '/' + allCorr.length + ' fixed';
                                                if (cf > 0) text += ', ' + cf + ' can\u2019t fix';
                                                text += ')';
                                                lbl.textContent = text;
                                            }
                                        });
                                        showToast(newStatus === 'yes' ? 'Marked as fixed' : newStatus === 'cant_fix' ? 'Marked as can\u2019t fix' : 'Unmarked', 'success');
                                    }).catch(function() {
                                        fb.disabled = false;
                                        cb.disabled = false;
                                        showToast('Failed to update. Try again.', 'error');
                                    });
                                }

                                fb.addEventListener('click', function() {
                                    updateStatus(correction.fixed === 'yes' ? '' : 'yes', '');
                                });
                                cb.addEventListener('click', function() {
                                    if (correction.fixed === 'cant_fix') {
                                        updateStatus('', '');
                                        return;
                                    }
                                    var note = prompt('Why can\u2019t this be fixed?');
                                    if (note === null) return;
                                    updateStatus('cant_fix', note);
                                });
                            })(c, fixBtn, cantBtn, row, body, proj, projEntries, card);

                            actions.appendChild(fixBtn);
                            actions.appendChild(cantBtn);
                            row.appendChild(actions);
                        }

                        card.appendChild(row);
                    });
                }

                // No entries at all
                if (projEntries.length === 0 && viewType !== 'both') {
                    card.appendChild(el('div', {className: 'editor-empty', textContent: 'No feedback submitted yet.'}));
                }

                // Notify Ram button (editors only, not admin since Ram IS admin)
                if (showActions && corrections.length > 0 && activeRole !== 'admin') {
                    var notifyBtn = el('button', {className: 'btn-notify', textContent: '\uD83D\uDCE9 Notify Ram'});
                    notifyBtn.addEventListener('click', (function(projData, projCorrections) {
                        return function() {
                            var fixed = projCorrections.filter(function(c) { return c.fixed === 'yes'; });
                            var cantFix = projCorrections.filter(function(c) { return c.fixed === 'cant_fix'; });
                            var pendingC = projCorrections.filter(function(c) { return !c.fixed; });

                            var summary = 'Project: ' + projData.name + '\n\n';
                            if (fixed.length > 0) {
                                summary += 'FIXED (' + fixed.length + '):\n';
                                fixed.forEach(function(c) {
                                    summary += '  [' + (c.timestamp || '-') + '] ' + c.content + '\n';
                                });
                                summary += '\n';
                            }
                            if (cantFix.length > 0) {
                                summary += 'CAN\u2019T FIX (' + cantFix.length + '):\n';
                                cantFix.forEach(function(c) {
                                    summary += '  [' + (c.timestamp || '-') + '] ' + c.content;
                                    if (c.fixedNote) summary += ' - ' + c.fixedNote;
                                    summary += '\n';
                                });
                                summary += '\n';
                            }
                            if (pendingC.length > 0) {
                                summary += 'PENDING (' + pendingC.length + '):\n';
                                pendingC.forEach(function(c) {
                                    summary += '  [' + (c.timestamp || '-') + '] ' + c.content + '\n';
                                });
                            }

                            notifyBtn.disabled = true;
                            notifyBtn.textContent = 'Sending...';
                            var params = new URLSearchParams();
                            params.append('type', 'feedback_notify');
                            params.append('project', projData.name);
                            params.append('summary', summary);
                            // Server-side auth: send project PIN from role blob
                            var nPin = (_roleData && _roleData.project_pins) ? _roleData.project_pins[projData.name] : '';
                            if (nPin) params.append('pin', nPin);
                            fetch(_config.script_url, {method: 'POST', body: params}).then(function() {
                                notifyBtn.disabled = false;
                                notifyBtn.textContent = '\u2714 Ram notified';
                                showToast('Email sent to Ram', 'success');
                                var waMsg = 'Hi Ram\n\n' + projData.name + ' update:\n\n';
                                waMsg += fixed.length + ' fixed, ' + cantFix.length + ' can\u2019t fix, ' + pendingC.length + ' pending';
                                var waUrl = 'https://wa.me/' + _config.ram_phone + '?text=' + encodeURIComponent(waMsg);
                                if (isAllowedUrl(waUrl)) {
                                    var a = el('a', {href: waUrl, target: '_blank', rel: 'noreferrer noopener'});
                                    a.click();
                                }
                            }).catch(function() {
                                notifyBtn.disabled = false;
                                notifyBtn.textContent = '\uD83D\uDCE9 Notify Ram';
                                showToast('Failed to send. Try again.', 'error');
                            });
                        };
                    })(proj, corrections));
                    card.appendChild(notifyBtn);
                }
            }

            return card;
        }

        // ── Editor Dashboard (role-filtered) ──
        function buildEditorDashboard(role, data) {
            var container = document.getElementById('editor-content');
            container.textContent = '';
            container.appendChild(el('div', {className: 'editor-loading', textContent: 'Loading corrections...'}));

            fetchFeedbackCSV(function(entries) {
                container.textContent = '';

                // Refresh button
                var refreshDiv = el('div', {className: 'editor-refresh'});
                var refreshBtn = el('button', {textContent: '\u21BB Refresh'});
                refreshBtn.addEventListener('click', function() { buildEditorDashboard(role, data); });
                refreshDiv.appendChild(refreshBtn);
                container.appendChild(refreshDiv);

                // Projects come pre-filtered from decrypted blob
                var projectSlugs = Object.keys(data.projects);
                var isPhotoEditor = role === 'photo-editor';
                var hasAny = false;
                projectSlugs.forEach(function(slug) {
                    var proj = data.projects[slug];

                    var projEntries = entries.filter(function(e) {
                        return e.project.toLowerCase() === proj.name.toLowerCase();
                    });

                    // Skip done projects with no entries
                    var effectiveStatus = proj.status || getStatus(proj, isPhotoEditor ? 'photo' : 'video');
                    if (projEntries.length === 0 && effectiveStatus === 'done') return;

                    hasAny = true;

                    // For type=both, photo editor sees photo side only, video editor sees video side only
                    var viewType = proj.type;
                    if (proj.type === 'both') {
                        viewType = isPhotoEditor ? 'photo' : 'video';
                    }

                    container.appendChild(buildProjectCard(slug, proj, projEntries, viewType, true));
                });

                if (!hasAny) {
                    container.appendChild(el('div', {className: 'editor-empty', textContent: 'No projects assigned to you.'}));
                }
            });
        }

        // ── Admin Dashboard (Ram sees everything) ──
        function buildAdminDashboard(data) {
            var container = document.getElementById('admin-content');
            container.textContent = '';
            container.appendChild(el('div', {className: 'editor-loading', textContent: 'Loading all projects...'}));

            fetchFeedbackCSV(function(entries) {
                container.textContent = '';

                // Refresh button
                var refreshDiv = el('div', {className: 'editor-refresh'});
                var refreshBtn = el('button', {textContent: '\u21BB Refresh'});
                refreshBtn.addEventListener('click', function() { buildAdminDashboard(data); });
                refreshDiv.appendChild(refreshBtn);
                container.appendChild(refreshDiv);

                // Collect unique editor names and status values for filters
                var editorNames = {};
                var projectSlugs = Object.keys(data.projects);
                projectSlugs.forEach(function(slug) {
                    var proj = data.projects[slug];
                    editorNames[proj.editor] = true;
                    if (proj.photo_editor) editorNames[proj.photo_editor] = true;
                });

                // Build filter tabs
                var tabs = el('div', {className: 'admin-tabs'});
                var filters = [
                    {key: 'all', label: 'All'},
                    {key: 'type:photo', label: '\uD83D\uDCF7 Photo'},
                    {key: 'type:video', label: '\uD83C\uDFAC Video'},
                ];
                Object.keys(editorNames).forEach(function(name) {
                    filters.push({key: 'editor:' + name, label: name});
                });
                filters.push({key: 'status:editing', label: 'Editing'});
                filters.push({key: 'status:review', label: 'Review'});
                filters.push({key: 'status:delivered', label: 'Delivered'});

                var activeFilter = 'all';
                var projectsContainer = el('div', {id: 'admin-projects'});

                function renderFiltered() {
                    projectsContainer.textContent = '';
                    var hasAny = false;

                    projectSlugs.forEach(function(slug) {
                        var proj = data.projects[slug];
                        var projEntries = entries.filter(function(e) {
                            return e.project.toLowerCase() === proj.name.toLowerCase();
                        });

                        // Apply filter
                        if (activeFilter !== 'all') {
                            var parts = activeFilter.split(':');
                            var filterType = parts[0];
                            var filterVal = parts[1];

                            if (filterType === 'type') {
                                if (filterVal === 'photo' && proj.type !== 'photo' && proj.type !== 'both') return;
                                if (filterVal === 'video' && proj.type !== 'video' && proj.type !== 'both') return;
                            } else if (filterType === 'editor') {
                                if (proj.editor !== filterVal && proj.photo_editor !== filterVal) return;
                            } else if (filterType === 'status') {
                                var projStatuses = [];
                                if (proj.type === 'both') {
                                    projStatuses.push(proj.photo_status || 'editing');
                                    projStatuses.push(proj.video_status || 'editing');
                                } else {
                                    projStatuses.push(proj.status || 'editing');
                                }
                                if (projStatuses.indexOf(filterVal) < 0) return;
                            }
                        }

                        hasAny = true;
                        projectsContainer.appendChild(buildProjectCard(slug, proj, projEntries, proj.type, true));
                    });

                    if (!hasAny) {
                        projectsContainer.appendChild(el('div', {className: 'editor-empty', textContent: 'No projects match this filter.'}));
                    }
                }

                filters.forEach(function(f) {
                    var tab = el('button', {
                        className: 'admin-tab' + (f.key === 'all' ? ' active' : ''),
                        textContent: f.label,
                        'data-filter': f.key,
                    });
                    tab.addEventListener('click', function() {
                        activeFilter = f.key;
                        tabs.querySelectorAll('.admin-tab').forEach(function(t) {
                            t.classList.remove('active');
                        });
                        tab.classList.add('active');
                        renderFiltered();
                    });
                    tabs.appendChild(tab);
                });

                container.appendChild(tabs);
                container.appendChild(projectsContainer);
                renderFiltered();
            });
        }

        // ── Client View: Show Fixed Status ──
        function loadClientFixedStatus() {
            if (!_config || !_config.gid_feedback || !currentProject) return;
            fetchFeedbackCSV(function(entries) {
                var corrections = entries.filter(function(e) {
                    return e.project.toLowerCase() === currentProject.name.toLowerCase() && e.type === 'correction';
                });
                if (corrections.length === 0) return;

                // Find or create the fixed status section
                var existingSection = document.getElementById('client-fixed-section');
                if (existingSection) existingSection.remove();

                var section = el('div', {className: 'section-card', id: 'client-fixed-section'});
                var heading = el('h3');
                heading.appendChild(el('span', {className: 'section-icon', textContent: '\u2714'}));
                heading.appendChild(document.createTextNode(' Correction Status'));
                section.appendChild(heading);

                var fixedCount = corrections.filter(function(c) { return c.fixed === 'yes'; }).length;
                var cantCount = corrections.filter(function(c) { return c.fixed === 'cant_fix'; }).length;
                var statusText = fixedCount + ' of ' + corrections.length + ' corrections fixed';
                if (cantCount > 0) statusText += ', ' + cantCount + ' can\u2019t fix';
                section.appendChild(el('div', {
                    style: 'font-size: 12px; color: #999; margin-bottom: 10px;',
                    textContent: statusText,
                }));

                var list = el('div', {className: 'client-fixed-list'});
                corrections.forEach(function(c) {
                    var itemClass = 'client-fixed-item';
                    var icon = '\u23F3';
                    if (c.fixed === 'yes') { itemClass += ' is-fixed'; icon = '\u2705'; }
                    else if (c.fixed === 'cant_fix') { icon = '\u274C'; }
                    var item = el('div', {className: itemClass});
                    item.appendChild(el('span', {
                        className: 'fix-indicator',
                        textContent: icon,
                    }));
                    var text = '';
                    if (c.timestamp) text += '[' + c.timestamp + '] ';
                    text += c.content;
                    item.appendChild(el('span', {textContent: text}));
                    if (c.fixed === 'cant_fix' && c.fixedNote) {
                        item.appendChild(el('div', {className: 'cant-fix-note', textContent: 'Note: ' + c.fixedNote}));
                    }
                    list.appendChild(item);
                });
                section.appendChild(list);

                // Insert before the history section
                var main = document.getElementById('main-content');
                var historyCard = main.lastElementChild ? main.lastElementChild.previousElementSibling : null;
                main.insertBefore(section, main.querySelector('.privacy-note') || null);
            });
        }

        // ── Init ──
        var params = new URLSearchParams(window.location.search);
        var role = params.get('role') || '';
        if (role === 'admin' || role === 'photo-editor' || role === 'video-editor') {
            document.getElementById('pin-gate').classList.add('hidden');
            document.querySelector('.subtitle').textContent = 'Dashboard';
            initRoleGate(role);
        } else if (role === 'editor') {
            // Backward compat: old ?role=editor URL → redirect to video-editor
            document.getElementById('pin-gate').classList.add('hidden');
            document.querySelector('.subtitle').textContent = 'Dashboard';
            initRoleGate('video-editor');
        } else {
            initPinGate();
        }
    })();
    </script>
</body>
