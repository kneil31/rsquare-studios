    <script nonce="deda612b67e78a26e48ccc9f9ead0d4c">
    (function() {
        'use strict';

        // ── Data (embedded at build time) ──
        var PROJECTS = {"sandhya": {"name": "***REDACTED_NAME***", "pin": "***REDACTED_PIN***", "editor": "Madhu", "editor_phone": "***REDACTED_PHONE***", "mega_link": "", "status": "editing", "versions": []}};
        var SCRIPT_URL = 'https://script.google.com/macros/s/***REDACTED_SCRIPT_ID***/exec';
        var EDITOR_PW = '***REMOVED***';
        var SHEET_ID = '***REDACTED_SHEET_ID***';
        var GID_FEEDBACK = '***REDACTED_GID***';
        var RAM_PHONE = '***REDACTED_PHONE***';

        // ── URL Allowlist ──
        var ALLOWED_HOSTS = [
            'wa.me',
            'script.google.com',
            'mega.nz',
            'youtube.com',
            'www.youtube.com',
            'youtu.be',
            'drive.google.com',
            'docs.google.com',
        ];

        function isAllowedUrl(url) {
            try {
                var u = new URL(url);
                return ALLOWED_HOSTS.some(function(h) {
                    return u.hostname === h || u.hostname.endsWith('.' + h);
                });
            } catch(e) {
                return false;
            }
        }

        // ── DOM Helpers (no innerHTML — security) ──
        function el(tag, attrs, children) {
            var e = document.createElement(tag);
            if (attrs) {
                Object.keys(attrs).forEach(function(k) {
                    if (k === 'className') e.className = attrs[k];
                    else if (k === 'textContent') e.textContent = attrs[k];
                    else if (k === 'htmlFor') e.htmlFor = attrs[k];
                    else e.setAttribute(k, attrs[k]);
                });
            }
            if (children) {
                (Array.isArray(children) ? children : [children]).forEach(function(c) {
                    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
                    else if (c) e.appendChild(c);
                });
            }
            return e;
        }

        // ── Toast ──
        function showToast(msg, type) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show toast-' + (type || 'success');
            setTimeout(function() { t.className = 'toast'; }, 3500);
        }

        // ── PIN Gate ──
        var pinAttempts = 0;
        var pinLockUntil = 0;
        var currentProject = null;

        function getProjectSlug() {
            var params = new URLSearchParams(window.location.search);
            return params.get('p') || '';
        }

        function initPinGate() {
            var slug = getProjectSlug();
            if (!slug || !PROJECTS[slug]) {
                var gate = document.getElementById('pin-gate');
                gate.textContent = '';
                gate.appendChild(el('p', {textContent: 'Invalid project link. Please check the URL you received.', style: 'color: #ef4444;'}));
                return;
            }

            var container = document.getElementById('pin-input');
            // Build 4 PIN input boxes
            for (var i = 0; i < 4; i++) {
                var inp = el('input', {
                    type: 'text',
                    inputmode: 'numeric',
                    maxlength: '1',
                    autocomplete: 'off',
                    'data-idx': String(i),
                });
                container.appendChild(inp);
            }

            // Event listeners for PIN inputs
            var inputs = container.querySelectorAll('input');
            inputs.forEach(function(inp, idx) {
                inp.addEventListener('input', function(e) {
                    var val = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = val;
                    if (val && idx < 3) inputs[idx + 1].focus();
                    if (idx === 3 && val) checkPin(inputs, slug);
                });
                inp.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                        inputs[idx - 1].focus();
                    }
                });
                // Prevent paste of non-numeric
                inp.addEventListener('paste', function(e) {
                    e.preventDefault();
                    var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                    for (var j = 0; j < 4 && j < paste.length; j++) {
                        inputs[j].value = paste[j];
                    }
                    if (paste.length >= 4) checkPin(inputs, slug);
                    else if (paste.length > 0) inputs[Math.min(paste.length, 3)].focus();
                });
            });

            inputs[0].focus();
        }

        function checkPin(inputs, slug) {
            var now = Date.now();
            if (now < pinLockUntil) {
                var secs = Math.ceil((pinLockUntil - now) / 1000);
                document.getElementById('pin-error').textContent = 'Too many attempts. Wait ' + secs + 's';
                clearPinInputs(inputs);
                return;
            }

            var entered = '';
            inputs.forEach(function(inp) { entered += inp.value; });

            if (entered === PROJECTS[slug].pin) {
                currentProject = PROJECTS[slug];
                currentProject.slug = slug;
                document.getElementById('pin-gate').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                buildMainContent();
            } else {
                pinAttempts++;
                if (pinAttempts >= 3) {
                    pinLockUntil = now + 15000;
                    document.getElementById('pin-error').textContent = 'Too many attempts. Wait 15s';
                    pinAttempts = 0;
                } else {
                    document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
                }
                clearPinInputs(inputs);
            }
        }

        function clearPinInputs(inputs) {
            inputs.forEach(function(inp) { inp.value = ''; });
            inputs[0].focus();
        }

        // ── Main Content Builder ──
        function buildMainContent() {
            var main = document.getElementById('main-content');

        function submitCorrections() {
            var rows = document.querySelectorAll('#corrections-list .correction-row');
            var generalNotes = document.getElementById('general-notes').value.trim();
            var corrections = [];

            rows.forEach(function(row) {
                // Skip rows marked as fixed
                if (row.classList.contains('fixed')) return;
                var ts = row.querySelector('[data-field="ts"]').value.trim();
                var desc = row.querySelector('[data-field="desc"]').value.trim();
                var priority = row.querySelector('[data-field="priority"]').value;
                if (desc) {
                    corrections.push({ts: ts || '\u2014', desc: desc, priority: priority});
                }
            });

            if (corrections.length === 0 && !generalNotes) {
                showToast('Please add at least one correction or note', 'error');
                return;
            }

            // Build combined content for Sheet
            var contentParts = corrections.map(function(c) {
                return '[' + c.ts + '] (' + c.priority.replace('_', ' ') + ') ' + c.desc;
            });
            if (generalNotes) contentParts.push('Notes: ' + generalNotes);

            // Post each correction as a separate row + general notes
            var pending = 0;
            var done = 0;

            corrections.forEach(function(c) {
                pending++;
                postFeedback({
                    type: 'feedback',
                    project: currentProject.name,
                    feedback_type: 'correction',
                    timestamp: c.ts,
                    content: c.desc,
                    priority: c.priority.replace('_', ' '),
                    pin: currentProject.pin,
                }, function() {
                    done++;
                    if (done === pending) onAllCorrectionsPosted();
                });
            });

            if (generalNotes) {
                pending++;
                postFeedback({
                    type: 'feedback',
                    project: currentProject.name,
                    feedback_type: 'correction',
                    timestamp: '',
                    content: generalNotes,
                    priority: '',
                    pin: currentProject.pin,
                }, function() {
                    done++;
                    if (done === pending) onAllCorrectionsPosted();
                });
            }

            if (pending === 0) return;

            function onAllCorrectionsPosted() {
                // Build WhatsApp message
                var msg = 'Hi bro\n\n' + currentProject.name + ' corrections:\n\n';
                corrections.forEach(function(c) {
                    msg += '[' + c.ts + '] ' + c.desc + '\n';
                });
                if (generalNotes) msg += '\nNotes: ' + generalNotes;
                openWhatsApp(msg);

                // Add to local history
                addToHistory({
                    type: 'correction',
                    content: contentParts.join('\n'),
                    time: new Date().toLocaleString(),
                });

                // Clear form
                document.getElementById('corrections-list').textContent = '';
                document.getElementById('general-notes').value = '';
                correctionCount = 0;
                addCorrectionRow();
            }
        }

        // ── CSV Parser (no external lib) ──
        function parseCSV(text) {
            var lines = [];
            var current = '';
            var inQuotes = false;
            var rows = [];
            for (var i = 0; i < text.length; i++) {
                var ch = text[i];
                if (inQuotes) {
                    if (ch === '"' && text[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        lines.push(current);
                        current = '';
                    } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                        lines.push(current);
                        current = '';
                        if (ch === '\r') i++;
                        rows.push(lines);
                        lines = [];
                    } else {
                        current += ch;
                    }
                }
            }
            if (current || lines.length > 0) {
                lines.push(current);
                rows.push(lines);
            }
            return rows;
        }

        function fetchFeedbackCSV(callback) {
            var url = SCRIPT_URL + '?action=feedback_read';
            fetch(url).then(function(r) { return r.json(); }).then(function(data) {

            }).catch(function() {
                callback([]);
            });
        }

        // ── Editor Password Gate ──
        var editorAttempts = 0;
        var editorLockUntil = 0;

        function initEditorGate() {
            var gate = document.getElementById('editor-gate');
            gate.classList.remove('hidden');
            var container = document.getElementById('editor-pw-input');
            var inp = el('input', {type: 'password', placeholder: 'Password', autocomplete: 'off'});
            var btn = el('button', {textContent: 'Unlock'});
            container.appendChild(inp);
            container.appendChild(btn);
            btn.addEventListener('click', function() { checkEditorPw(inp); });
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkEditorPw(inp);
            });
            inp.focus();
        }

        function checkEditorPw(inp) {
            var now = Date.now();
            var errEl = document.getElementById('editor-error');
            if (now < editorLockUntil) {
                var secs = Math.ceil((editorLockUntil - now) / 1000);
                errEl.textContent = 'Too many attempts. Wait ' + secs + 's';
                return;
            }
            if (inp.value === EDITOR_PW) {
                document.getElementById('editor-gate').classList.add('hidden');
                document.getElementById('editor-content').classList.remove('hidden');
                buildEditorDashboard();
            } else {
                editorAttempts++;
                if (editorAttempts >= 3) {
                    editorLockUntil = now + 15000;
                    errEl.textContent = 'Too many attempts. Wait 15s';
                    editorAttempts = 0;
                } else {
                    errEl.textContent = 'Incorrect password.';
                }
                inp.value = '';
                inp.focus();
            }
        }

                                return function() {
                                    var newFixed = !correction.fixed;

                                    button.textContent = '...';
                                    var params = new URLSearchParams();
                                    params.append('type', 'feedback_update');
                                    params.append('project', proj.name);
                                    params.append('timestamp', correction.timestamp);
                                    params.append('content', correction.content);
                                    params.append('fixed', newFixed ? 'yes' : '');
                                    fetch(SCRIPT_URL, {method: 'POST', body: params}).then(function() {
                                        correction.fixed = newFixed;
                                        button.disabled = false;
                                        button.textContent = newFixed ? '\u2714 Fixed' : 'Fix';
                                        button.className = 'fix-btn' + (newFixed ? ' fixed' : '');
                                        if (newFixed) rowEl.classList.add('is-fixed');
                                        else rowEl.classList.remove('is-fixed');

                                };

        // ── Client View: Show Fixed Status ──
        function loadClientFixedStatus() {
            if (!GID_FEEDBACK || !currentProject) return;
            fetchFeedbackCSV(function(entries) {
                var corrections = entries.filter(function(e) {
                    return e.project.toLowerCase() === currentProject.name.toLowerCase() && e.type === 'correction';
                });
                if (corrections.length === 0) return;

                // Find or create the fixed status section
                var existingSection = document.getElementById('client-fixed-section');
                if (existingSection) existingSection.remove();

                var section = el('div', {className: 'section-card', id: 'client-fixed-section'});
                var heading = el('h3');
                heading.appendChild(el('span', {className: 'section-icon', textContent: '\u2714'}));
                heading.appendChild(document.createTextNode(' Correction Status'));
                section.appendChild(heading);

                var fixedCount = corrections.filter(function(c) { return c.fixed; }).length;
                section.appendChild(el('div', {
                    style: 'font-size: 12px; color: #999; margin-bottom: 10px;',
                    textContent: fixedCount + ' of ' + corrections.length + ' corrections fixed',
                }));

                var list = el('div', {className: 'client-fixed-list'});
                corrections.forEach(function(c) {
                    var item = el('div', {className: 'client-fixed-item' + (c.fixed ? ' is-fixed' : '')});
                    item.appendChild(el('span', {
                        className: 'fix-indicator',
                        textContent: c.fixed ? '\u2705' : '\u23F3',
                    }));
                    var text = '';
                    if (c.timestamp) text += '[' + c.timestamp + '] ';
                    text += c.content;
                    item.appendChild(el('span', {textContent: text}));
                    list.appendChild(item);
                });
                section.appendChild(list);

                // Insert before the history section
                var main = document.getElementById('main-content');
                var historyCard = main.lastElementChild ? main.lastElementChild.previousElementSibling : null;
                main.insertBefore(section, main.querySelector('.privacy-note') || null);
            });
        }

        // ── Init ──
        var params = new URLSearchParams(window.location.search);
        var role = params.get('role') || '';
        if (role === 'editor') {
            document.getElementById('pin-gate').classList.add('hidden');
            document.querySelector('.subtitle').textContent = 'Editor Dashboard';
            initEditorGate();
        } else {
            initPinGate();
        }
    })();
    </script>
</body>
</html>
