GiM=";
        const PBKDF2_ITERATIONS = 400000;
        const ALLOWED_HOSTS = ['www.smugmug.com', 'photos.smugmug.com', 'www.rsquarestudios.com', 'rsquarestudios.com'];
        const CATEGORY_SLUGS = ["wedding", "engagement", "pre_wedding", "half_saree", "maternity", "baby_shower", "birthday", "cradle", "celebrations"];

        function isAllowedUrl(url) {
            try {
                var parsed = new URL(url);
                if (parsed.protocol !== 'https:') return false;
                return ALLOWED_HOSTS.some(function(h) { return parsed.hostname === h || parsed.hostname.endsWith('.' + h); });
            } catch(e) { return false; }
        }

        async function deriveKey(password, salt) {
            var enc = new TextEncoder();
            var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
            );
        }

        async function decryptContent(password, blob) {
            var raw = Uint8Array.from(atob(blob), function(c) { return c.charCodeAt(0); });
            var salt = raw.slice(0, 16);
            var iv = raw.slice(16, 28);
            var ciphertext = raw.slice(28);
            var key = await deriveKey(password, salt);
            var decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
            return new TextDecoder().decode(decrypted);
        }

        function makeEl(tag, cls, text) {
            var el = document.createElement(tag);
            if (cls) el.className = cls;
            if (text) el.textContent = text;
            return el;
        }

        var currentView = 'home';
        var allData = null;

        function showCategories() {
            currentView = 'home';
            var el = document.getElementById('content');
            el.innerHTML = '';
            var data = allData['portfolio-home'];
            el.appendChild(makeEl('h1', 'page-title', data.title));
            el.appendChild(makeEl('div', 'page-meta', data.total_galleries + ' galleries · Tap any category to browse'));
            var grid = makeEl('div', 'cat-grid');
            (data.categories || []).forEach(function(cat) {
                var tile = makeEl('div', 'cat-tile');
                tile.onclick = function() { showCategory(cat.slug); };
                var tileImg = makeEl('div', 'cat-tile-img');
                if (isAllowedUrl(cat.cover)) {
                    tileImg.style.backgroundImage = "url('" + cat.cover + "')";
                    tileImg.style.backgroundPosition = cat.cover_pos || 'center center';
                }
                tile.appendChild(tileImg);
                var content = makeEl('div', 'cat-tile-content');
                content.appendChild(makeEl('div', 'cat-name', cat.label));
                content.appendChild(makeEl('div', 'cat-count', cat.count + ' galleries'));
                tile.appendChild(content);
                grid.appendChild(tile);
            });
            el.appendChild(grid);
            window.scrollTo(0, 0);
        }

        function showCategory(slug) {
            currentView = slug;
            var el = document.getElementById('content');
            el.innerHTML = '';
            var data = allData['portfolio-' + slug];
            if (!data) return;

            var back = makeEl('a', 'back-link', '← Back to Portfolio');
            back.href = '#';
            back.onclick = function(e) { e.preventDefault(); showCategories(); };
            el.appendChild(back);

            var catHero = makeEl('div', 'cat-hero');
            if (data.cover && isAllowedUrl(data.cover)) {
                catHero.style.backgroundImage = "url('" + data.cover + "')";
                catHero.style.backgroundPosition = data.hero_pos || 'center center';
            }
            var catHeroContent = makeEl('div', 'cat-hero-content');
            catHeroContent.appendChild(makeEl('div', 'cat-hero-title', data.label));
            catHeroContent.appendChild(makeEl('div', 'cat-hero-sub', data.count + ' galleries'));
            catHero.appendChild(catHeroContent);
            el.appendChild(catHero);

            var galleryGrid = makeEl('div', 'gallery-grid');
            (data.galleries || []).forEach(function(g) {
                if (!g.url || !isAllowedUrl(g.url)) return;
                var card = document.createElement('a');
                card.href = g.url;
                card.target = '_blank';
                card.rel = 'noreferrer noopener';
                card.className = 'gallery-card';
                card.appendChild(makeEl('div', 'gallery-monogram', g.monogram || '?'));
                var info = makeEl('div', 'gallery-info');
                info.appendChild(makeEl('div', 'gallery-name', g.name));
                var metaText = (g.location ? g.location + ' · ' : '') + g.date;
                info.appendChild(makeEl('div', 'gallery-meta', metaText));
                card.appendChild(info);
                card.appendChild(makeEl('div', 'gallery-arrow', '→'));
                galleryGrid.appendChild(card);
            });
            el.appendChild(galleryGrid);
            window.scrollTo(0, 0);
        }

        (async function() {
            var params = new URLSearchParams(window.location.search);
            var key = params.get('k');
            var ts = parseInt(params.get('t') || '0', 10);
            var categoryFilter = params.get('c') || '';

            // Clear URL params
            if (key) { window.history.replaceState(null, '', window.location.pathname); }

            // Check expiry — 48 hours
            var now = Math.floor(Date.now() / 1000);
            if (!key || !ts || (now - ts) > 172800) {
                document.getElementById('expired').style.display = 'block';
                return;
            }

            try {
                var plaintext = await decryptContent(key, ENCRYPTED_BLOB);
                allData = JSON.parse(plaintext);
                document.getElementById('content').style.display = 'block';
                document.getElementById('footer').style.display = 'block';
                // If category filter specified, jump directly to that category
                if (categoryFilter && allData['portfolio-' + categoryFilter]) {
                    showCategory(categoryFilter);
                } else {
                    showCategories();
                }
            } catch(e) {
                document.getElementById('expired').style.display = 'block';
            }
        })();
    </script>
